# /etc/nginx/conf.d/listasdaqui.conf
# Configuração para CentOS 7 + CWP

# Redirect HTTP → HTTPS
server {
  listen 80;
  server_name listasdaqui.com.br www.listasdaqui.com.br;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name listasdaqui.com.br www.listasdaqui.com.br;

  # SSL — ajustar caminhos conforme certificado CWP/Let's Encrypt
  ssl_certificate     /etc/letsencrypt/live/listasdaqui.com.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/listasdaqui.com.br/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;

  root /var/www/listasdaqui/public;
  index index.html;

  # Logs
  access_log /var/log/nginx/listasdaqui-access.log;
  error_log  /var/log/nginx/listasdaqui-error.log;

  # Uploads — servir diretamente pelo Nginx com cache longo
  location /uploads/ {
    alias /var/www/listasdaqui/uploads/;
    expires 30d;
    add_header Cache-Control "public, immutable";
    add_header Vary Accept-Encoding;
    try_files $uri =404;
  }

  # Assets estáticos do Next.js
  location /_next/static/ {
    proxy_pass http://127.0.0.1:3000;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Admin — proteção extra (opcional: adicionar allow/deny por IP)
  location /admin/ {
    # allow 186.xxx.xxx.xxx;  # seu IP fixo
    # deny all;

    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host       $host;
    proxy_set_header X-Real-IP  $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    add_header X-Frame-Options        DENY;
    add_header X-Content-Type-Options nosniff;
  }

  # WordPress legado — redirecionar para homepage
  location ~ ^/negocios/ {
    return 301 https://listasdaqui.com.br/;
  }
  location ~ ^/segmentos/ {
    return 301 https://listasdaqui.com.br/;
  }
  location ~ ^/wp-admin {
    return 301 https://listasdaqui.com.br/;
  }

  # Tudo mais → Next.js
  location / {
    proxy_pass         http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection 'upgrade';
    proxy_set_header   Host       $host;
    proxy_set_header   X-Real-IP  $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;

    # Timeout generoso para builds SSG
    proxy_read_timeout 60s;
  }

  # ── Segurança global ──────────────────────────────────────────────────────
  add_header X-Content-Type-Options  "nosniff"           always;
  add_header X-Frame-Options         "SAMEORIGIN"        always;
  add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

  # ── Gzip ──────────────────────────────────────────────────────────────────
  gzip              on;
  gzip_static       on;          # serve .gz pré-comprimidos se existirem
  gzip_vary         on;
  gzip_min_length   1024;
  gzip_proxied      any;
  gzip_comp_level   6;
  gzip_buffers      16 8k;
  gzip_http_version 1.1;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    text/cache-manifest
    application/json
    application/javascript
    application/x-javascript
    application/xml
    application/xml+rss
    application/manifest+json
    application/x-web-app-manifest+json
    image/svg+xml
    image/x-icon
    font/ttf
    font/otf
    font/woff
    font/woff2
    application/font-woff
    application/vnd.ms-fontobject;

  # ── Brotli (requer módulo ngx_brotli instalado no servidor) ───────────────
  # Para instalar no CentOS/CWP:
  #   yum install nginx-module-brotli   (ou compilar manualmente)
  # Descomentar após confirmar que o módulo está disponível:
  # brotli            on;
  # brotli_static     on;
  # brotli_comp_level 6;
  # brotli_types
  #   text/plain text/css text/xml text/javascript
  #   application/json application/javascript application/manifest+json
  #   image/svg+xml font/woff font/woff2;
}
